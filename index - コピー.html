<!DOCTYPE html>
<html>
<head>
  <title>MY notes</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f5f6fa;
      max-width: 700px;
      margin: 40px auto;
    }

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 30px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
    }

    .add-btn { background: #4a90e2; color: white; }
    .delete-btn { background: #e74c3c; color: white; }
    .done-btn { background: #2ecc71; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    th { background: #f0f0f0; }

    /* 完了したものの見た目 */
    .completed {
      text-decoration: line-through;
      color: #999;
    }

    th:first-child, td:first-child {
      width: 120px;
    }

    .edit-input {
      width: 100%;
    }

  </style>
</head>

<body>

  <h1>MY NOTES</h1>

  <div class="input-area">
    <input id="noteInput" placeholder="Write something...">
    <button class="add-btn" onclick="addNote()">ADD</button>
  </div>

  <!-- 未完了 -->
  <h2>Active</h2>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Contents</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="activeTable"></tbody>
  </table>

  <!-- 完了 -->
  <h2>Completed</h2>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Contents</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="completedTable"></tbody>
  </table>

  <script>
    // データ取得（doneフラグ追加）
    let notes = JSON.parse(localStorage.getItem("notes")) || [];

    // 表描画
    function render() {
      const activeTable = document.getElementById("activeTable");
      const completedTable = document.getElementById("completedTable");

      activeTable.innerHTML = "";
      completedTable.innerHTML = "";

      notes.forEach((note, index) => {
        const tr = document.createElement("tr");

        // 完了済みなら見た目変更
        if (note.done) tr.classList.add("completed");

        // 未完了
        if (!note.done) {
          tr.innerHTML = `
            <td>${note.date}</td>
            <td onclick="startEdit(${index}, this)">
              ${note.text}
            </td>
            <td>
              <button class="done-btn" onclick="markDone(${index})">DONE</button>
            </td>
          `;
          activeTable.appendChild(tr);
        }

        // 完了済み
        else {
          tr.innerHTML = `
            <td>${note.date}</td>
            <td>${note.text}</td>
            <td>
              <button class="delete-btn" onclick="deleteNote(${index})">DELETE</button>
            </td>
          `;
          completedTable.appendChild(tr);
        }
      });
    }

    // 追加
    function addNote() {
      const input = document.getElementById("noteInput");
      if (input.value === "") return;

      notes.push({
        date: new Date().toLocaleDateString(),
        text: input.value,
        done: false // 未完了
      });

      localStorage.setItem("notes", JSON.stringify(notes));
      input.value = "";
      render();
    }

    // 完了にする
    function markDone(index) {
      notes[index].done = true;
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    // 削除（完了したものだけ使う想定）
    function deleteNote(index) {
      notes.splice(index, 1);
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    // 編集開始
    function startEdit(index, cell) {
      const input = document.createElement("input");
      input.value = notes[index].text;
      input.className = "edit-input";

      cell.innerHTML = "";
      cell.appendChild(input);
      input.focus();

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") finishEdit(index, input.value);
      });

      input.addEventListener("blur", () => {
        finishEdit(index, input.value);
      });
    }

    // 編集終了
    function finishEdit(index, newText) {
      if (newText === "") return;

      notes[index].text = newText;
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    render();
  </script>

</body>
</html>
