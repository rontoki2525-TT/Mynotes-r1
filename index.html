<!DOCTYPE html>
<html>
<head>
  <title>MY NOTES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>MY NOTES</h1>

  <div class="nav">
    <a href="index.html">Notes</a>
    <a href="novel.html">Novel</a>
  </div>

  <!-- カテゴリ -->
  <div class="input-area">
    <input id="newCategory" placeholder="New category">
    <button onclick="addCategory()">ADD CAT</button>
    <button onclick="deleteCategory()">DEL CAT</button>
  </div>

  <!-- メモ -->
  <div class="input-area">
    <select id="categorySelect"></select>
    <input id="noteInput" placeholder="Write something...">
    <button onclick="addNote()">ADD</button>
  </div>

  <h2>Active</h2>

  <!-- PC用テーブル -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>Contents</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="activeTable"></tbody>
    </table>
  </div>

  <!-- スマホ用カード -->
  <div id="activeCards"></div>

  <h2>Completed</h2>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>Contents</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="completedTable"></tbody>
    </table>
  </div>

  <div id="completedCards"></div>

  <script src="script.js"></script>

</body>
</html>
