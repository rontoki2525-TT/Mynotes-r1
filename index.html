<!DOCTYPE html>
<html>
<head>
  <title>MY NOTES</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f5f6fa;
      max-width: 800px;
      margin: 40px auto;
    }

    h1 { text-align: center; }
    h2 { margin-top: 30px; }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    input { flex: 1; }

    button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
    }

    .add-btn { background: #4a90e2; color: white; }
    .done-btn { background: #2ecc71; color: white; }
    .undo-btn { background: #f39c12; color: white; }
    .delete-btn { background: #e74c3c; color: white; }
    .save-btn { background: #3498db; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    th { background: #f0f0f0; }

    .category-row {
      background: #dfe6e9;
      font-weight: bold;
    }

    .completed {
      text-decoration: line-through;
      color: #999;
    }

    .edit-input {
      width: 100%;
    }

  </style>
</head>

<body>

  <h1>MY NOTES</h1>

  <div class="input-area">
    <select id="categorySelect">
      <option value="Shopping">Shopping</option>
      <option value="Goals">Goals</option>
      <option value="Todo">Todo</option>
    </select>

    <input id="noteInput" placeholder="Write something...">
    <button class="add-btn" onclick="addNote()">ADD</button>
  </div>

  <!-- 未完了 -->
  <h2>Active</h2>
  <table>
    <thead>
      <tr>
        <th>Contents</th>
        <th>Date</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="activeTable"></tbody>
  </table>

  <!-- 完了 -->
  <h2>Completed</h2>
  <table>
    <thead>
      <tr>
        <th>Contents</th>
        <th>Date</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="completedTable"></tbody>
  </table>

  <script>
    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    let editingIndex = -1;

    const categories = ["Shopping", "Goals", "Todo"];

    // 日付フォーマット（YYYY/MM/DD）
    function getFormattedDate() {
      const now = new Date();
      return `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    }

    function render() {
      const activeTable = document.getElementById("activeTable");
      const completedTable = document.getElementById("completedTable");

      activeTable.innerHTML = "";
      completedTable.innerHTML = "";

      // 新しい順に並び替え
      const reversed = [...notes].reverse();

      // ===== Active =====
      categories.forEach(cat => {
        const filtered = reversed.filter(n => n.category === cat && !n.done);

        if (filtered.length > 0) {
          const header = document.createElement("tr");
          header.className = "category-row";
          header.innerHTML = `<td colspan="3">${cat}</td>`;
          activeTable.appendChild(header);

          filtered.forEach(note => {
            const index = notes.indexOf(note);
            const tr = document.createElement("tr");

            if (editingIndex === index) {
              tr.innerHTML = `
                <td><input id="editInput" class="edit-input" value="${note.text}"></td>
                <td>${note.date}</td>
                <td><button class="save-btn" onclick="saveEdit(${index})">✔</button></td>
              `;
            } else {
              tr.innerHTML = `
                <td onclick="startEdit(${index})">${note.text}</td>
                <td>${note.date}</td>
                <td><button class="done-btn" onclick="markDone(${index})">DONE</button></td>
              `;
            }

            activeTable.appendChild(tr);
          });
        }
      });

      // ===== Completed =====
      categories.forEach(cat => {
        const filtered = reversed.filter(n => n.category === cat && n.done);

        if (filtered.length > 0) {
          const header = document.createElement("tr");
          header.className = "category-row";
          header.innerHTML = `<td colspan="3">${cat}</td>`;
          completedTable.appendChild(header);

          filtered.forEach(note => {
            const index = notes.indexOf(note);
            const tr = document.createElement("tr");
            tr.classList.add("completed");

            tr.innerHTML = `
              <td>${note.text}</td>
              <td>${note.date}</td>
              <td>
                <button class="undo-btn" onclick="undoDone(${index})">UNDO</button>
                <button class="delete-btn" onclick="deleteNote(${index})">DELETE</button>
              </td>
            `;

            completedTable.appendChild(tr);
          });
        }
      });
    }

    function addNote() {
      const input = document.getElementById("noteInput");
      const category = document.getElementById("categorySelect").value;

      if (input.value === "") return;
      if (!confirm("Add this note?")) return;

      notes.push({
        date: getFormattedDate(),
        text: input.value,
        done: false,
        category: category
      });

      localStorage.setItem("notes", JSON.stringify(notes));
      input.value = "";
      render();
    }

    function markDone(index) {
      if (!confirm("Mark as done?")) return;
      notes[index].done = true;
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    function undoDone(index) {
      if (!confirm("Return to active?")) return;
      notes[index].done = false;
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    function deleteNote(index) {
      if (!confirm("Delete this note?")) return;
      notes.splice(index, 1);
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    function startEdit(index) {
      editingIndex = index;
      render();
    }

    function saveEdit(index) {
      const input = document.getElementById("editInput");
      if (input.value === "") return;

      notes[index].text = input.value;
      editingIndex = -1;

      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    // Enterで追加
    document.getElementById("noteInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        addNote();
      }
    });

    render();
  </script>

</body>
</html>
