<!DOCTYPE html>
<html>
<head>
  <title>MY NOTES</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif; /* 全体フォント */
      background: #f5f6fa;
      max-width: 900px;
      margin: 40px auto;
    }

    h1 { text-align: center; }

    /* ===== ナビゲーション ===== */
    .nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .nav a {
      text-decoration: none;
      padding: 6px 12px;
      background: #dfe6e9;
      border-radius: 6px;
      font-size: 13px;
      color: black;
    }

    .nav a:hover {
      background: #b2bec3;
    }

    h2 { margin-top: 30px; }

    /* ===== 入力エリア ===== */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    input { flex: 1; } /* 横いっぱいに広げる */

    /* ===== ボタン ===== */
    button {
      padding: 5px 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 11px;
    }

    .add-btn { background: #4a90e2; color: white; }
    .done-btn { background: #2ecc71; color: white; }
    .undo-btn { background: #f39c12; color: white; }
    .delete-btn { background: #e74c3c; color: white; }

    /* ===== テーブル ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      table-layout: fixed; /* 列幅固定（重要） */
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      border-right: 1px solid #ddd; /* 縦線 */
    }

    th:last-child, td:last-child {
      border-right: none;
    }

    th {
      background: #e9ecef;
      font-weight: bold;
    }

    /* ===== 列幅調整 ===== */
    th:nth-child(2), td:nth-child(2) {
      width: 110px; /* DATE */
      white-space: nowrap;
    }

    th:nth-child(3), td:nth-child(3) {
      width: 120px; /* ACTION */
      white-space: nowrap;
    }

    /* カテゴリ見出し */
    .category-row {
      background: #dfe6e9;
      font-weight: bold;
    }

    /* 完了した行 */
    .completed {
      text-decoration: line-through;
      color: #999;
    }

    /* 編集用input */
    .edit-input {
      width: 100%;
      padding: 5px;
    }

  </style>
</head>

<body>

  <h1>MY NOTES</h1>

  <!-- ===== ナビ（ページ遷移） ===== -->
  <div class="nav">
    <a href="index.html">Notes</a>
    <a href="todo.html">Todo</a>
    <a href="goals.html">Goals</a>
  </div>

  <!-- ===== 入力エリア ===== -->
  <div class="input-area">
    <select id="categorySelect">
      <option value="Shopping">Shopping</option>
      <option value="Goals">Goals</option>
      <option value="Todo">Todo</option>
    </select>

    <input id="noteInput" placeholder="Write something...">
    <button class="add-btn" onclick="addNote()">ADD</button>
  </div>

  <!-- ===== 未完了 ===== -->
  <h2>Active</h2>
  <table>
    <thead>
      <tr>
        <th>Contents</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="activeTable"></tbody>
  </table>

  <!-- ===== 完了 ===== -->
  <h2>Completed</h2>
  <table>
    <thead>
      <tr>
        <th>Contents</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="completedTable"></tbody>
  </table>

  <script>
    // ===== データ取得（ローカル保存） =====
    let notes = JSON.parse(localStorage.getItem("notes")) || [];

    // 編集中のインデックス管理
    let editingIndex = -1;

    // カテゴリ一覧
    const categories = ["Shopping", "Goals", "Todo"];

    // ===== 日付フォーマット =====
    function getFormattedDate() {
      const now = new Date();
      return `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    }

    // ===== 描画処理 =====
    function render() {
      const activeTable = document.getElementById("activeTable");
      const completedTable = document.getElementById("completedTable");

      activeTable.innerHTML = "";
      completedTable.innerHTML = "";

      // 新しい順に並べる
      const reversed = [...notes].reverse();

      // ===== Active（未完了） =====
      categories.forEach(cat => {
        const filtered = reversed.filter(n => n.category === cat && !n.done);

        if (filtered.length > 0) {

          // カテゴリ見出し
          const header = document.createElement("tr");
          header.className = "category-row";
          header.innerHTML = `<td colspan="3">${cat}</td>`;
          activeTable.appendChild(header);

          filtered.forEach(note => {
            const index = notes.indexOf(note);
            const tr = document.createElement("tr");

            // ===== 編集モード =====
            if (editingIndex === index) {
              tr.innerHTML = `
                <td><input id="editInput" class="edit-input" value="${note.text}"></td>
                <td>${note.date}</td>
                <td></td>
              `;

              setTimeout(() => {
                const input = document.getElementById("editInput");

                input.focus();

                // Enterで保存
                input.addEventListener("keydown", function(e) {
                  if (e.key === "Enter") saveEdit(index);
                });

                // フォーカス外でも保存
                input.addEventListener("blur", function() {
                  saveEdit(index);
                });

              }, 0);

            } else {
              // ===== 通常表示 =====
              tr.innerHTML = `
                <td onclick="startEdit(${index})">${note.text}</td>
                <td>${note.date}</td>
                <td>
                  <button class="done-btn" onclick="markDone(${index})">DONE</button>
                </td>
              `;
            }

            activeTable.appendChild(tr);
          });
        }
      });

      // ===== Completed（完了） =====
      categories.forEach(cat => {
        const filtered = reversed.filter(n => n.category === cat && n.done);

        if (filtered.length > 0) {

          const header = document.createElement("tr");
          header.className = "category-row";
          header.innerHTML = `<td colspan="3">${cat}</td>`;
          completedTable.appendChild(header);

          filtered.forEach(note => {
            const index = notes.indexOf(note);
            const tr = document.createElement("tr");
            tr.classList.add("completed");

            tr.innerHTML = `
              <td>${note.text}</td>
              <td>${note.date}</td>
              <td>
                <button class="undo-btn" onclick="undoDone(${index})">UNDO</button>
                <button class="delete-btn" onclick="deleteNote(${index})">DELETE</button>
              </td>
            `;

            completedTable.appendChild(tr);
          });
        }
      });
    }

    // ===== 追加 =====
    function addNote() {
      const input = document.getElementById("noteInput");
      const category = document.getElementById("categorySelect").value;

      if (input.value === "") return;

      notes.push({
        date: getFormattedDate(),
        text: input.value,
        done: false,
        category: category
      });

      localStorage.setItem("notes", JSON.stringify(notes));

      input.value = "";
      render();
    }

    // ===== 完了にする =====
    function markDone(index) {
      notes[index].done = true;
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    // ===== 未完了に戻す =====
    function undoDone(index) {
      notes[index].done = false;
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    // ===== 削除（確認あり） =====
    function deleteNote(index) {
      if (!confirm("Delete this note?")) return;

      notes.splice(index, 1);
      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    // ===== 編集開始 =====
    function startEdit(index) {
      editingIndex = index;
      render();
    }

    // ===== 編集保存 =====
    function saveEdit(index) {
      const input = document.getElementById("editInput");

      if (!input || input.value === "") {
        editingIndex = -1;
        render();
        return;
      }

      notes[index].text = input.value;
      editingIndex = -1;

      localStorage.setItem("notes", JSON.stringify(notes));
      render();
    }

    // ===== Enterで追加 =====
    document.getElementById("noteInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addNote();
    });

    // 初期描画
    render();
  </script>

</body>
</html>
