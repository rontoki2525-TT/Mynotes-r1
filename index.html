<!DOCTYPE html>
<html>
<head>
  <title>MY NOTES</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>MY NOTES</h1>

  <!-- ナビ -->
  <div class="nav">
    <a href="index.html">Notes</a>
    <a href="novel.html">Novel</a>
  </div>

  <!-- カテゴリ追加 -->
  <div class="input-area">
    <input id="newCategory" placeholder="New category">
    <button onclick="addCategory()">ADD CAT</button>
    <button onclick="deleteCategory()">DEL CAT</button>
  </div>

  <!-- メモ追加 -->
  <div class="input-area">
    <select id="categorySelect"></select>
    <input id="noteInput" placeholder="Write something...">
    <button onclick="addNote()">ADD</button>
  </div>

  <h2>Active</h2>
  <table>
    <thead>
      <tr>
        <th>Contents</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="activeTable"></tbody>
  </table>

  <h2>Completed</h2>
  <table>
    <thead>
      <tr>
        <th>Contents</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="completedTable"></tbody>
  </table>

  <script src="script.js"></script>

</body>
</html>
