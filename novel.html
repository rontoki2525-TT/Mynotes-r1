<!DOCTYPE html>
<html>
<head>
  <title>Novel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>MY NOVEL</h1>

  <div class="nav">
    <a href="index.html">Notes</a>
    <a href="novel.html">Novel</a>
  </div>

  <textarea id="novelArea" style="width:100%; height:60vh; padding:10px;"></textarea>

  <br><br>

  <button onclick="saveNovel()">SAVE</button>

  <script>
    function saveNovel() {
      const text = document.getElementById("novelArea").value;
      localStorage.setItem("novel", text);
      alert("Saved!");
    }

    window.onload = function() {
      document.getElementById("novelArea").value =
        localStorage.getItem("novel") || "";
    }
  </script>

</body>
</html>
