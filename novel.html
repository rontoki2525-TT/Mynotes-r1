<!DOCTYPE html>
<html>
<head>
  <title>Novel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 20px;
      font-family: serif;
      background: #f5f6fa;
    }

    h1 { text-align: center; }

    textarea {
      width: 100%;
      height: 80vh;
      padding: 20px;

      writing-mode: vertical-rl; /* 縦書き */
      text-orientation: upright;

      line-height: 2;
      font-size: 18px;

      border: 1px solid #ccc;
      border-radius: 10px;

      background: white;
    }
  </style>
</head>

<body>

  <h1>MY NOVEL</h1>

  <textarea id="novelArea"></textarea>

  <br><br>

  <button onclick="saveNovel()">SAVE</button>

  <script>
    function saveNovel() {
      const text = document.getElementById("novelArea").value;
      localStorage.setItem("novel", text);
      alert("Saved!");
    }

    window.onload = function() {
      document.getElementById("novelArea").value =
        localStorage.getItem("novel") || "";
    }
  </script>

</body>
</html>
